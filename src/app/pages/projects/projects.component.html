<!-- ═══════════════════════════════════════════════════ PROJECTS PAGE ══ -->
<div class="relative min-h-screen bg-[#03050a] pt-[68px] overflow-hidden">

  <!-- Grid bg -->
  <div class="absolute inset-0 pointer-events-none opacity-40" style="background-image: linear-gradient(rgba(0,245,255,0.025) 1px, transparent 1px),
                                 linear-gradient(90deg, rgba(0,245,255,0.025) 1px, transparent 1px);
              background-size: 60px 60px;"></div>

  <div class="relative w-full max-w-[1400px] mx-auto px-6 py-20">

    <!-- Header -->
    <div class="mb-16">
      <div class="flex items-center gap-3 mb-4">
        <span class="block w-6 h-px bg-cyan/50"></span>
        <span class="font-mono text-cyan/60 text-[0.6rem] tracking-[0.35em] uppercase">Work</span>
      </div>
      <h1 class="font-display font-black text-snow uppercase tracking-tight" style="font-size:clamp(2rem,5vw,4rem);">
        Projects</h1>
      <p class="font-mono text-snow/30 text-[0.7rem] tracking-wider mt-3 max-w-lg">
        A collection of systems and web applications built across different stacks and domains.
      </p>
    </div>

    <!-- Filter tabs -->
    <div class="flex flex-wrap gap-2 mb-12">
      <button *ngFor="let tag of filterTags" (click)="activeFilter = tag" [ngClass]="activeFilter === tag
                ? 'border-cyan text-cyan bg-[rgba(0,245,255,0.05)]'
                : 'border-white/10 text-white/30'"
        class="font-mono text-[0.6rem] tracking-[0.2em] uppercase px-4 py-2 border transition-all duration-200 cursor-pointer bg-transparent hover:border-cyan/30 hover:text-white/60">
        {{ tag }}
      </button>
    </div>

    <!-- Project grid -->
    <div class="grid md:grid-cols-2 xl:grid-cols-2 gap-6">
      <a *ngFor="let proj of filteredProjects; let i = index" [routerLink]="['/projects', proj.id]"
        class="no-underline group relative border border-snow/10 hover:border-cyan/40 bg-[#060a0f] p-8 transition-all duration-300 hover:shadow-[0_0_50px_rgba(0,245,255,0.06)] overflow-hidden flex flex-col">

        <!-- Top corners -->
        <div
          class="absolute top-0 left-0 w-4 h-4 border-t border-l border-cyan/30 group-hover:border-cyan group-hover:w-6 group-hover:h-6 transition-all duration-300">
        </div>
        <div
          class="absolute top-0 right-0 w-4 h-4 border-t border-r border-cyan/30 group-hover:border-cyan group-hover:w-6 group-hover:h-6 transition-all duration-300">
        </div>

        <!-- Hover scan line -->
        <div
          class="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-cyan/0 to-transparent group-hover:via-cyan/30 transition-all duration-500">
        </div>

        <!-- Index + status -->
        <div class="flex items-center justify-between mb-6">
          <span class="font-mono text-[0.55rem] text-cyan/40 tracking-widest">PROJECT_{{ i < 9 ? '0' : '' }}{{ i+1
              }}</span>
              <span class="font-mono text-[0.55rem] tracking-widest uppercase px-2 py-0.5 rounded-full border"
                [ngClass]="proj.status === 'Completed' ? 'border-cyan/30 text-cyan/60' : 'border-yellow-500/30 text-yellow-400/60'">
                {{ proj.status }}
              </span>
        </div>

        <!-- Title -->
        <h2
          class="font-display font-black text-snow text-xl uppercase tracking-tight mb-3 group-hover:text-cyan transition-colors duration-200">
          {{ proj.name }}
        </h2>

        <!-- Description -->
        <p class="font-mono text-snow/40 text-[0.72rem] leading-relaxed mb-6 flex-1">{{ proj.desc }}</p>

        <!-- Highlights -->
        <ul class="space-y-1 mb-6">
          <li *ngFor="let hl of proj.highlights" class="flex items-start gap-2 font-mono text-[0.65rem] text-snow/30">
            <span class="text-cyan/40 mt-px shrink-0">›</span>{{ hl }}
          </li>
        </ul>

        <!-- Tech stack -->
        <div class="flex flex-wrap gap-2 mt-auto">
          <span *ngFor="let t of proj.stack"
            class="font-mono text-[0.55rem] tracking-widest uppercase px-2 py-0.5 border border-cyan/20 text-cyan/50 group-hover:border-cyan/40 group-hover:text-cyan/70 transition-all duration-200">
            {{ t }}
          </span>
        </div>

        <!-- Arrow -->
        <div class="absolute bottom-8 right-8 opacity-0 group-hover:opacity-100 transition-opacity duration-200">
          <svg class="w-4 h-4 text-cyan" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M7 17L17 7M17 7H7M17 7v10" />
          </svg>
        </div>
      </a>
    </div>

    <!-- GitHub callout -->
    <div class="mt-16 border border-dashed border-snow/10 p-10 text-center relative overflow-hidden">
      <div class="absolute inset-0 pointer-events-none"
        style="background:radial-gradient(ellipse at 50% 100%, rgba(0,245,255,0.03) 0%, transparent 70%)"></div>
      <p class="font-mono text-snow/30 text-[0.7rem] tracking-widest mb-4 uppercase">More work available on</p>
      <a href="https://github.com/Peerapat021" target="_blank" rel="noopener"
        class="inline-flex items-center gap-2 no-underline text-cyan font-mono text-[0.75rem] tracking-[0.2em] uppercase hover:underline">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
          <path
            d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z" />
        </svg>
        github.com/Peerapat021 ↗
      </a>
    </div>
  </div>
</div>
